version: 0.2

env:
  secrets-manager:
    SECRET_USERNAME: "pipeline-docker-secret-auth:username"
    SECRET_PASSWORD: "pipeline-docker-secret-auth:password"

phases:
  build:
    commands:
      - echo "Logging in to Docker registry"
      - echo "$SECRET_USERNAME" | docker login -u "$SECRET_USERNAME" --password-stdin

build:
    commands:
      - echo "Building Docker Image..."
      - docker build -t arshaansindhwani/arsenal-db:latest .

post_build:
    commands:
      - echo "Pushing Docker Image..."
      - docker push arshaansindhwani/arsenal-db:latest .

artifacts:
  files:
    - Dockerfile